        );
      }

      // Person selected
      var canSubmit = dates.length > 0 && (dates.indexOf("Can't make it") !== -1 || games.length === 4);
      var cantMakeIt = dates.indexOf("Can't make it") !== -1;
      var submitLabel = dates.length === 0 ? "Select at least one option" : cantMakeIt ? "Submit" : games.length !== 4 ? "Pick " + (4 - games.length) + " more game" + (4 - games.length !== 1 ? "s" : "") : "I'm in. Submit";

      return h("div", {style:containerStyle},
        h(Header, {subtitle: person.emoji + " " + person.name + ", you're invited"}),
        h(InfoBar, null),
        h("div", {style:{padding:"12px 20px 0",maxWidth:500,margin:"0 auto"}},
          h("button", {onClick:goBack, style:{background:"none",border:"none",color:"#8b949e",fontSize:"13px",fontWeight:600,cursor:"pointer",padding:"4px 0",display:"flex",alignItems:"center",gap:"4px"}},
            "\u2190 Not " + person.name + "? Go back"
          )
        ),
        h("div", {style:{display:"flex",gap:"4px",padding:"8px 20px 8px",maxWidth:500,margin:"0 auto"}},
          h("button", {onClick:function(){setView("survey");}, style:toggleStyleFn(view==="survey")}, "\uD83D\uDCDD Take Survey"),
          h("button", {onClick:function(){setView("results");}, style:toggleStyleFn(view==="results")}, "\uD83D\uDCCA Results")
        ),
        h("div", {style:{padding:"12px 20px 40px",maxWidth:500,margin:"0 auto"}},
          // Survey form
          view === "survey" && !submitted && !alreadyResponded ? h("div", null,
            // Invite message
            h("div", {style:Object.assign({},cardStyle,{marginBottom:"24px"})},
              h("p", {style:{margin:"0 0 16px",fontSize:"20px",fontWeight:800,color:"#f97316"}}, person.name + ", you're invited. " + person.emoji),
              h("p", {style:{margin:"0",fontSize:"15px",color:"#e6edf3",lineHeight:1.75}}, person.message),
              h("p", {style:{margin:"16px 0 0",fontSize:"14px",color:"#fb923c",fontWeight:600}}, "Fill this out real quick so we can lock everything in. \u2B07\uFE0F")
            ),
            // Dietary
            h(Section, {title:"Any food allergies or dietary restrictions?",subtitle:"Select all that apply"},
              h("div", {style:{display:"flex",flexWrap:"wrap",gap:"8px"}},
                DIETARY_OPTIONS.map(function(opt) { return h(Chip, {key:opt,label:opt,selected:dietary.indexOf(opt)!==-1,onClick:function(){toggleItem(dietary,setDietary,opt);}}); }),
                h(Chip, {label:"Other",selected:showOtherDietary,onClick:function(){setShowOtherDietary(!showOtherDietary);}})
              ),
              showOtherDietary ? h("input", {type:"text",placeholder:"Please specify...",value:dietaryOther,onChange:function(e){setDietaryOther(e.target.value);},style:inputStyle}) : null
            ),
            // Drinks
            h(Section, {title:"What drinks do you want to see?",subtitle:"Select all that apply"},
              h("div", {style:{display:"flex",flexWrap:"wrap",gap:"8px"}},
                DRINK_OPTIONS.map(function(opt) { return h(Chip, {key:opt,label:opt,selected:drinks.indexOf(opt)!==-1,onClick:function(){toggleItem(drinks,setDrinks,opt);}}); }),
                h(Chip, {label:"Other",selected:showOtherDrink,onClick:function(){setShowOtherDrink(!showOtherDrink);}})
              ),
              showOtherDrink ? h("input", {type:"text",placeholder:"Please specify...",value:drinkOther,onChange:function(e){setDrinkOther(e.target.value);},style:inputStyle}) : null
            ),
            // Dates
            h(Section, {title:"Which dates work for you?",subtitle:"Select all that work"},
              h("div", {style:{display:"flex",flexDirection:"column",gap:"8px"}},
                DATE_OPTIONS.map(function(opt) {
                  return h(DateChip, {key:opt,label:opt,selected:dates.indexOf(opt)!==-1,onClick:function(){
                    if (opt === "Can't make it") {
                      if (dates.indexOf(opt) !== -1) setDates([]);
                      else { setDates(["Can't make it"]); setGames([]); }
                    } else {
                      var filtered = dates.filter(function(d){return d!=="Can't make it";});
                      if (filtered.indexOf(opt) !== -1) setDates(filtered.filter(function(d){return d!==opt;}));
                      else setDates(filtered.concat([opt]));
                    }
                  }});
                })
              )
            ),
            // Games
            !cantMakeIt && dates.length > 0 ? h(Section, {title:"Pick Your Poison \uD83C\uDFAF",subtitle:"Pick your top 4 games"},
              h("div", {style:{display:"flex",flexDirection:"column",gap:"8px"}},
                GAME_OPTIONS.map(function(opt) {
                  return h(DateChip, {key:opt,label:opt,selected:games.indexOf(opt)!==-1,onClick:function(){
                    if (games.indexOf(opt) !== -1) setGames(games.filter(function(g){return g!==opt;}));
                    else if (games.length < 4) setGames(games.concat([opt]));
                  }});
                })
              ),
              games.length > 0 && games.length < 4 ? h("p", {style:{margin:"8px 0 0",fontSize:"12px",color:"#6e7681"}}, (4-games.length)+" more to go") : null
            ) : null,
            // Submit
            h("button", {onClick:handleSubmit, disabled:!canSubmit, style:submitStyleFn(canSubmit)}, submitLabel)
          ) : null,

          // Submitted confirmation
          view === "survey" && submitted ? h("div", {style:{textAlign:"center",padding:"60px 20px"}},
            h("div", {style:{fontSize:"56px",marginBottom:"16px"}}, cantMakeIt ? "\uD83D\uDE22" : "\uD83C\uDF89"),
            h("h2", {style:{margin:"0 0 8px",fontSize:"22px",fontWeight:700,color:"#f97316"}},
              cantMakeIt ? "We'll miss you, "+person.name+"." : "You're locked in, "+person.name+"!"
            ),
            h("p", {style:{color:"#8b949e",fontSize:"15px",margin:0}},
              cantMakeIt ? "If anything changes, let us know." : "We'll let you know the final date soon. See you there."
            )
          ) : null,

          // Already responded
          view === "survey" && !submitted && alreadyResponded ? h("div", {style:{textAlign:"center",padding:"60px 20px"}},
            h("div", {style:{fontSize:"56px",marginBottom:"16px"}}, "\u2705"),
            h("h2", {style:{margin:"0 0 8px",fontSize:"22px",fontWeight:700,color:"#f97316"}},
              "You already responded, "+person.name+"!"
            ),
            h("p", {style:{color:"#8b949e",fontSize:"15px",margin:0}},
              "We've got your answers. See you on game night."
            )
          ) : null,

          // Results
          view === "results" ? h(ResultsView, {loading:loading, responses:responses, totalResponses:totalResponses, respondedNames:respondedNames, tallyItems:tallyItems, resetSurvey:resetSurvey, deleteResponse:deleteResponse}) : null
        )
      );
    }

    ReactDOM.render(h(App), document.getElementById("root"));
  </script>
</body>
</html>
